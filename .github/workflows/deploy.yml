name: Deploy API to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'API/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Zip the app (sans venv)
        run: |
          cd API
          zip -r ../app.zip . -x "antenv/*" "__pycache__/*" "*.pyc" ".venv/*"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: airparadis-api4
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./app.zip
